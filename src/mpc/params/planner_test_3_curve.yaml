/mpc_planner:
  ros__parameters:
    backend_class: mpc.nmpc_algorithm:NMPCController
    pose_topic: /robot_pose
    cmd_vel_topic: /cmd_vel
    control_rate: 5.0
    dt: 0.2
    seed: 7

    goal_x: -1.2
    goal_y: 3.8
    goal_theta: 0.0

    v_min: 0.0
    v_max: 0.5
    omega_max: 1.0

    x_knots: [-5.0, -4.0, -3.0, -2.0, -1.0, 0.0]
    y_low_knots:  [3.0, 2.8, 3.1, 3.7, 3.25, 3.0]
    y_high_knots: [4.0, 3.8, 4.1, 4.7, 4.25, 4.0]

    w_pos: 2.0
    w_theta: 0.1
    w_u: 0.05
    w_corr: 5000.0

    mppi.n_traj: 128
    mppi.horizon: 32
    mppi.noise_sigma_v: 0.7
    mppi.noise_sigma_omega: 0.6
    mppi.temperature: 1.0
    mppi.w_du: 0.25

    mpc.N: 20
    mpc.w_du: 0.2
    mpc.w_pos_T: 50.0
    mpc.w_theta_T: 10.0
    mpc.solver_max_iter: 1000
    mpc.solver_tol: 1.0e-3
    mpc.solver_constr_viol_tol: 1.0e-2

robot_pose_publisher:
  ros__parameters:
    pose_topic: /robot_pose
    source_frame_id: base_link
    target_frame_id: map
    update_rate: 30.0
    use_sim_time: true