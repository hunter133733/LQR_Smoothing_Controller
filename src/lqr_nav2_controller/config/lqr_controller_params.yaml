controller_server:
  ros__parameters:
    use_sim_time: true

    # Frequency at which the controller is called (Hz)
    controller_frequency: 10.0

    # Minimum speed thresholds — tweak to match your robot
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    # Progress checker: abort if the robot stalls here too long
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5       # metres
      movement_time_allowance: 10.0       # seconds

    # Goal checker: tolerance at which we declare success
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25            # metres
      yaw_goal_tolerance: 0.25           # radians
      stateful: true

    # Plug in controller
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "lqr_nav2_controller::LQRController"

      max_linear_vel: 0.5
      max_angular_vel: 1.2

      v_min: 0.0
      v_max: 0.5
      w_min: -1.2
      w_max: 1.2

      dt: 0.1
      horizon: 25

      cost_x: 5.0
      cost_y: 5.0
      cost_theta: 2.0

      # Δu penalty
      cost_dv: 0.05
      cost_dw: 0.10