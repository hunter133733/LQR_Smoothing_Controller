# Experiment — Figure-8: Smoothed LQR (du_v=1, du_w=2)
# Same trajectory as baseline for direct comparison.
#
#   After run: cp results/metrics/current_run.csv results/metrics/fig8_smooth_1_2.csv

/controller_node:
  ros__parameters:
    backend_class: controller.lqr_smoothing_augmented:LQRSmoothingController
    pose_topic: /robot_pose
    cmd_vel_topic: /cmd_vel
    nom_traj_topic: /traj
    control_rate: 10.0
    dt: 0.1
    use_sim_time: true

    lqr.horizon: 20
    lqr.x_cost: 6.0
    lqr.y_cost: 6.0
    lqr.theta_cost: 2.0
    lqr.v_cost: 0.25
    lqr.w_cost: 0.30
    lqr.v_min: -0.2
    lqr.v_max: 0.8
    lqr.w_min: -1.5
    lqr.w_max: 1.5

    lqr_smooth.du_v_cost: 50.0
    lqr_smooth.du_w_cost: 100.0

    reference.kind: to_goal
    reference.n_steps: 500

    # Put goal outside arena so neither the controller nor the node
    # ever triggers a stop — Ctrl+C ends the run manually
    goal_x: 999.0
    goal_y: 999.0
    goal_theta: 0.0
    goal_tolerance_m: 0.10
    goal_settle_steps: 5

    fig8.center_x: 0.0
    fig8.center_y: 0.0
    fig8.radius: 1.2
    fig8.speed: 0.5
    fig8.n_laps: 1

/figure8_publisher:
  ros__parameters:
    nom_traj_topic: /traj
    dt: 0.1
    fig8.center_x: 0.0
    fig8.center_y: 0.0
    fig8.radius: 1.8
    fig8.speed: 0.3
    fig8.n_laps: 1