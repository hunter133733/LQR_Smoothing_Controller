/controller_node:
  ros__parameters:
    backend_class: controller.lqr_smoothing_algorithm:LQRSmoothingController
    pose_topic: /robot_pose
    cmd_vel_topic: /cmd_vel
    nom_traj_topic: /traj
    control_rate: 5.0
    dt: 0.2
    

    # --- LQR Gains (identical across all 4 test configs) ---
    lqr.horizon: 20
    lqr.x_cost: 6.0
    lqr.y_cost: 6.0
    lqr.theta_cost: 2.0
    lqr.v_cost: 0.25
    lqr.w_cost: 0.30
    lqr.v_min: -0.2
    lqr.v_max: 0.5
    lqr.w_min: -1.0
    lqr.w_max: 1.0

    # --- Smoothing params (only difference from lqr_long.yaml) ---
    lqr_smooth.alpha_v: 0.70
    lqr_smooth.alpha_w: 0.55
    lqr_smooth.max_dv: 0.25
    lqr_smooth.max_dw: 0.50

    # --- Reference (identical across all 4 test configs) ---
    reference.kind: to_goal
    reference.n_steps: 400  # long path — more steps for extended travel

    # --- Long path goal: ~8m away with a significant heading change ---
    goal_x: -5.0
    goal_y: 6.0
    goal_theta: 0.5
