/controller_node:
  ros__parameters:
    backend_class: controller.lqr_algorithm:LQRController
    pose_topic: /robot_pose
    cmd_vel_topic: /cmd_vel
    
    control_rate: 5.0
    dt: 0.2

    lqr.horizon: 20
    lqr.x_cost: 5.0
    lqr.y_cost: 5.0
    lqr.theta_cost: 1.0
    lqr.v_cost: 0.1
    lqr.w_cost: 0.1
    lqr.v_min: -0.2
    lqr.v_max: 1.0
    lqr.w_min: -1.2
    lqr.w_max: 1.2

    reference.kind: to_goal
    reference.n_steps: 250

    goal_x: 3.5
    goal_y: 2.5
    goal_theta: 0.0