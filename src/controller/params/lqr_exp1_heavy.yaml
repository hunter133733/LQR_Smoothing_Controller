# Experiment 1 — Run 4: Smoothed LQR (λ ≈ 10, heavy smoothing)
# alpha_w=0.10, max_dw=0.10 — very strong, expect tracking degradation on turns
/controller_node:
  ros__parameters:
    backend_class: controller.lqr_smoothing_augmented:LQRSmoothingController
    pose_topic: /robot_pose
    cmd_vel_topic: /cmd_vel
    nom_traj_topic: /traj
    control_rate: 10.0
    dt: 0.1
    use_sim_time: true

    lqr.horizon: 20
    lqr.x_cost: 6.0
    lqr.y_cost: 6.0
    lqr.theta_cost: 2.0
    lqr.v_cost: 0.25
    lqr.w_cost: 0.30
    lqr.v_min: -0.2
    lqr.v_max: 0.5
    lqr.w_min: -1.0
    lqr.w_max: 1.0

    # --- Lecture-style delta-u penalty weights ---
    # Increase these to make commands smoother.
    lqr_smooth.du_v_cost: 10.0
    lqr_smooth.du_w_cost: 20.0

    reference.kind: to_goal
    reference.n_steps: 500

    goal_x: -2.0
    goal_y: -4.0
    goal_theta: 0.0
